<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
  >
  <title>For You ♥</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#120810">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=pagaling">
</head>
<body>
  <div class="sky" aria-hidden="true">
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="glow glow-3"></div>
  </div>
  <div class="petals" id="petals" aria-hidden="true"></div>

  <main class="stage">
    <section class="intro" id="intro">
      <div class="intro-copy">
        <p class="whisper">for someone special</p>
        <h1>Tap the love</h1>
        <p class="hint">something soft is waiting</p>
      </div>

      <button class="love-btn" id="love-btn" type="button" aria-label="Open the love">
        <span class="love-btn-ring" aria-hidden="true"></span>
        <span class="love-btn-heart" aria-hidden="true">♥</span>
        <span class="love-btn-label">love</span>
      </button>

      <div class="intro-spacer" aria-hidden="true"></div>
    </section>

    <section class="reveal" id="reveal" hidden>
      <div class="scene">
        <div class="message" id="message" aria-live="polite">
          <p class="message-line" id="line-1">I LOVE YOU</p>
          <p class="message-line message-line-big" id="line-2">VERY MUCH</p>
          <p class="message-line message-wish" id="line-4">pagaling ka</p>
          <p class="message-from" id="line-3">love <em>nelnel</em></p>
        </div>

        <!-- Original multi-layer CSS rose -->
        <div class="rose" id="flower">
          <div class="stem" aria-hidden="true">
            <div class="leaf leaf-l"></div>
            <div class="leaf leaf-r"></div>
            <div class="thorn t1"></div>
            <div class="thorn t2"></div>
          </div>

          <div class="bloom" aria-hidden="true">
            <div class="rose-layer layer-outer">
              <span class="rp r1"></span>
              <span class="rp r2"></span>
              <span class="rp r3"></span>
              <span class="rp r4"></span>
              <span class="rp r5"></span>
              <span class="rp r6"></span>
              <span class="rp r7"></span>
              <span class="rp r8"></span>
            </div>
            <div class="rose-layer layer-mid">
              <span class="rp r1"></span>
              <span class="rp r2"></span>
              <span class="rp r3"></span>
              <span class="rp r4"></span>
              <span class="rp r5"></span>
              <span class="rp r6"></span>
            </div>
            <div class="rose-layer layer-inner">
              <span class="rp r1"></span>
              <span class="rp r2"></span>
              <span class="rp r3"></span>
              <span class="rp r4"></span>
              <span class="rp r5"></span>
            </div>
            <div class="rose-bud"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="js/main.js?v=cssrose"></script>
</body>
</html>
